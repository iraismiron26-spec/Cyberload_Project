# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v4                        ║
# ║  Fix: Eliminado libgstreamer1.0-dev y deps conflictivas             ║
# ║       apt --fix-broken antes de instalar                            ║
# ║       Instalación dividida en 2 bloques para mejor diagnóstico      ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v4 — deps limpias)
    runs-on: ubuntu-22.04

    env:
      JAVA_HOME:                     /usr/lib/jvm/java-17-openjdk-amd64
      BUILDOZER_WARN_ON_ROOT:        "0"
      BUILDOZER_ANDROID_API:         "33"
      BUILDOZER_ANDROID_MINAPI:      "26"
      BUILDOZER_ANDROID_NDK_VERSION: "25b"

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Configurar Python 3.10 ────────────────────────────
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── PASO 3A: Sanear el sistema de paquetes ─────────────────────
      #
      # FIX DIRECTO al error "held broken packages":
      #   · apt-get upgrade -y   → sincroniza versiones del runner
      #   · apt --fix-broken install → resuelve dependencias rotas
      #                               ANTES de instalar nada nuevo
      #
      # Esto elimina el estado inconsistente que causaba el conflicto
      # con libgstreamer1.0-dev y sus sub-dependencias.
      - name: 🧹 Sanear sistema de paquetes (fix-broken)
        run: |
          sudo apt-get update -qq
          sudo apt-get upgrade -y -qq
          sudo apt --fix-broken install -y
          echo "✅ Sistema de paquetes saneado"

      # ── PASO 3B: Instalar herramientas base ────────────────────────
      #
      # Solo herramientas universales sin dependencias conflictivas.
      # Separado del bloque de librerías para aislar errores.
      #
      # ELIMINADOS respecto a v3 (causaban conflictos):
      #   ✗ libgstreamer1.0-dev  → conflicto "held broken packages"
      #   ✗ libglib2.0-dev       → sub-dep de gstreamer, conflictiva
      #   ✗ lld                  → conflicto con build-essential
      #   ✗ libncurses5-dev      → duplicado conflictivo con libncurses5
      - name: 🔧 Instalar herramientas base del sistema
        run: |
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            curl \
            openjdk-17-jdk \
            python3-pip \
            build-essential \
            ccache \
            autoconf \
            libtool \
            cmake \
            ninja-build \
            pkg-config
          echo "✅ Herramientas base instaladas"

      # ── PASO 3C: Instalar librerías de desarrollo ──────────────────
      #
      # Solo las librerías estrictamente necesarias para compilar
      # las recetas nativas de p4a que usa tu app:
      #
      #   libssl-dev      → yt-dlp / instaloader (urllib3, requests)
      #   libffi-dev      → cffi, módulos nativos de Python
      #   libltdl-dev     → libtool, recetas p4a que usan .so dinámicos
      #   zlib1g-dev      → compresión, requerida por pillow y p4a
      #   libjpeg-dev     → pillow (decodificación JPEG)
      #   libpng-dev      → pillow (decodificación PNG)
      #   libsqlite3-dev  → yt-dlp usa sqlite3 para caché interno
      #   patchelf        → p4a reubica rutas de .so en el APK
      #   libncurses5     → herramientas del NDK de Android
      #   libcurl4-openssl-dev → recetas de red en p4a
      - name: 🔧 Instalar librerías de desarrollo
        run: |
          sudo apt-get install -y \
            libssl-dev \
            libffi-dev \
            libltdl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libsqlite3-dev \
            patchelf \
            libncurses5
          echo "✅ Librerías de desarrollo instaladas"

      # ── PASO 4: Instalar Buildozer, Cython y herramientas Python ───
      - name: 📦 Instalar Buildozer, Cython y herramientas Python
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer
          pip install virtualenv colorama
          echo "✅ Buildozer y Cython instalados"

      # ── PASO 5: Verificar versiones ────────────────────────────────
      - name: 🔍 Verificar versiones instaladas
        run: |
          echo "── Python ──────────────────────────────"
          python --version
          echo "── Java ────────────────────────────────"
          java -version
          echo "── Buildozer ───────────────────────────"
          buildozer version
          echo "── Cython ──────────────────────────────"
          cython --version
          echo "── patchelf ────────────────────────────"
          patchelf --version
          echo "── cmake ───────────────────────────────"
          cmake --version

      # ── PASO 6: Restaurar caché (SDK / NDK / Gradle / p4a) ────────
      - name: 💾 Restaurar caché (SDK / NDK / Gradle / p4a)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v4-${{ runner.os }}-

      # ── PASO 7: Aceptar licencias Android SDK — Fase 1 (hashes) ───
      #
      # Escribe los hashes oficiales de licencia en la ruta que
      # Buildozer usa para el SDK. Cubre el caso en que el SDK
      # ya está en caché de un run anterior.
      - name: 🔐 Licencias Android SDK — Fase 1 (hashes directos)
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/licenses"

          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > "$SDK_DIR/licenses/android-sdk-license"

          printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK_DIR/licenses/android-sdk-preview-license"

          printf "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > "$SDK_DIR/licenses/intel-android-extra-license"

          echo "✅ Hashes escritos:"
          ls -la "$SDK_DIR/licenses/"

      # ── PASO 8: Aceptar licencias Android SDK — Fase 2 (sdkmanager)
      #
      # Descarga el binario oficial de sdkmanager y acepta todas
      # las licencias con "yes |" antes de que Buildozer llame a
      # sdkmanager internamente (donde no hay input disponible).
      - name: 🔐 Licencias Android SDK — Fase 2 (sdkmanager yes)
        run: |
          SDK_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          SDK_INSTALL_DIR="$HOME/.buildozer/android/platform/android-sdk"
          TOOLS_DIR="$SDK_INSTALL_DIR/cmdline-tools/latest"

          mkdir -p "$TOOLS_DIR"
          wget -q "$SDK_TOOLS_URL" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-raw
          cp -r /tmp/cmdline-tools-raw/cmdline-tools/* "$TOOLS_DIR/"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-raw

          export ANDROID_SDK_ROOT="$SDK_INSTALL_DIR"
          yes | "$TOOLS_DIR/bin/sdkmanager" \
            --licenses \
            --sdk_root="$SDK_INSTALL_DIR" || true

          echo "✅ Licencias aceptadas via sdkmanager"
          ls -la "$SDK_INSTALL_DIR/licenses/" 2>/dev/null || true

      # ── PASO 9: Preparar entorno y verificar archivos del repo ─────
      - name: ⚙️ Preparar entorno y verificar archivos del repo
        run: |
          export HOME=/home/runner
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"

          echo "── Archivos en la raíz del repo ────────"
          ls -la

          echo ""
          echo "── Verificación de archivos requeridos ─"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f — NO encontrado (build fallará)"
            fi
          done

      # ── PASO 10: Preparar SDK / NDK (buildozer android update) ─────
      #
      # Descarga SDK/NDK si no están en caché y configura el entorno.
      # "|| true" porque sdkmanager a veces devuelve exit code 1
      # con warnings no fatales.
      - name: 🛠️ Preparar SDK y NDK (buildozer android update)
        run: |
          export HOME=/home/runner
          export PATH="$HOME/.local/bin:$PATH"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"

          yes | buildozer android update 2>&1 | tee update.log || true
          echo "✅ Update finalizado"

      # ── PASO 11: Compilar APK (buildozer -v android debug) ─────────
      #
      # "script --return" captura stdout + stderr + subprocesos.
      # Es más completo que "tee" para capturar errores tempranos.
      - name: 🔨 Compilar APK (buildozer -v android debug)
        run: |
          export HOME=/home/runner
          export PATH="$HOME/.local/bin:$PATH"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          script --return --quiet -c \
            "buildozer -v android debug 2>&1" \
            build.log
          echo "✅ Compilación finalizada"

      # ── PASO 12: Verificar APKs generados ──────────────────────────
      - name: 📋 Verificar APKs y árbol del workspace
        run: |
          echo "── Contenido de bin/ ───────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── Todos los .apk en el workspace ──────"
          find . -name "*.apk" 2>/dev/null || echo "⚠️  Ningún .apk encontrado"

          echo ""
          echo "── Árbol del workspace (nivel 2) ───────"
          find . -maxdepth 2 \
            -not -path './.buildozer/*' \
            -not -path './.git/*' \
            | sort

      # ── PASO 13: Subir APK como artefacto descargable ──────────────
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── PASO 14: Subir logs (siempre, incluso si el build falla) ───
      - name: 📄 Subir logs de build y update (siempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-v4
          path: |
            build.log
            update.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml   ← ESTE ARCHIVO
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png
#    └── buildozer.spec
# ──────────────────────────────────────────────────────────────────────
