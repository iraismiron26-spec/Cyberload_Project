# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions Workflow — CYBERLOAD MSTL v13.0                     ║
# ║  Automatiza la construcción del APK con Buildozer en Ubuntu          ║
# ║                                                                      ║
# ║  Ruta en tu repo: .github/workflows/build_apk.yml                   ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build Android APK

# ── Activador ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

# ── Trabajo principal ──────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Cyberload MSTL v13 APK
    runs-on: ubuntu-latest

    # ── Fix warning: fuerza Node.js 24 en todas las actions ──────────
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ── PASO 1: Clonar el repositorio ────────────────────────────────
      - name: 🔍 Checkout del Repositorio
        uses: actions/checkout@v4

      # ── PASO 2: Configurar Python 3.9 ────────────────────────────────
      - name: 🐍 Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── PASO 3: Instalar Buildozer y Cython ──────────────────────────
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.19

      # ── PASO 4: Instalar dependencias del sistema (apt-get) ───────────
      - name: 🔧 Instalar Dependencias del Sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev
          sudo apt-get install -y libffi8 || sudo apt-get install -y libffi6 || true

      # ── PASO 5: Configurar Java 17 ────────────────────────────────────
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── PASO 6: Configurar Android SDK, Build Tools y NDK ────────────
      #
      # ╔═══════════════════════════════════════════════════════════════╗
      # ║  FIX DEFINITIVO — "Aidl not found"                           ║
      # ╠═══════════════════════════════════════════════════════════════╣
      # ║  CAUSA RAÍZ:                                                  ║
      # ║  Buildozer NO usa ANDROID_HOME. Su código fuente              ║
      # ║  (targets/android.py) revisa la variable ANDROIDSDK.          ║
      # ║  Además, busca aidl en su propia ruta:                        ║
      # ║    ~/.buildozer/android/platform/android-sdk/                 ║
      # ║  y no en el SDK del sistema.                                  ║
      # ║                                                               ║
      # ║  SOLUCIÓN (3 partes):                                         ║
      # ║  1. Instalar build-tools;33.0.2 y NDK 25b en el SDK          ║
      # ║     pre-instalado del runner (/usr/local/lib/android/sdk).    ║
      # ║  2. Crear un symlink para que la ruta interna de Buildozer    ║
      # ║     apunte al SDK pre-instalado (donde sí está aidl).         ║
      # ║  3. Exportar ANDROIDSDK y ANDROIDNDK — las variables que      ║
      # ║     Buildozer realmente lee — via $GITHUB_ENV.                ║
      # ╚═══════════════════════════════════════════════════════════════╝
      - name: 📱 Configurar Android SDK, Build Tools y NDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          NDK_VERSION="25.1.8937393"
          NDK_PATH="$ANDROID_SDK/ndk/$NDK_VERSION"

          echo "══ [1/4] Aceptando licencias del SDK ══"
          yes | $SDKMANAGER --licenses || true

          echo "══ [2/4] Instalando build-tools;33.0.2, android-33 y NDK 25b ══"
          $SDKMANAGER \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools" \
            "ndk;$NDK_VERSION"

          echo "══ [3/4] Verificando aidl y NDK ══"
          ls -la "$ANDROID_SDK/build-tools/33.0.2/aidl" \
            && echo "✅ aidl encontrado" \
            || { echo "❌ aidl NO encontrado — abortando"; exit 1; }

          ls -d "$NDK_PATH" \
            && echo "✅ NDK 25b encontrado en $NDK_PATH" \
            || echo "⚠️  NDK path no encontrado, Buildozer lo intentará descargar"

          echo "══ [4/4] Creando symlink para Buildozer ══"
          # Buildozer busca su SDK en: ~/.buildozer/android/platform/android-sdk/
          # El symlink redirige esa ruta al SDK pre-instalado del runner.
          mkdir -p "$HOME/.buildozer/android/platform"
          if [ ! -e "$HOME/.buildozer/android/platform/android-sdk" ]; then
            ln -s "$ANDROID_SDK" "$HOME/.buildozer/android/platform/android-sdk"
            echo "✅ Symlink creado: ~/.buildozer/android/platform/android-sdk → $ANDROID_SDK"
          else
            echo "ℹ️  Symlink/directorio ya existe (cache hit)"
          fi

          echo "══ Exportando variables a GITHUB_ENV ══"
          # ANDROIDSDK y ANDROIDNDK → variables que Buildozer realmente lee
          echo "ANDROID_HOME=$ANDROID_SDK"       >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK"   >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_SDK"         >> $GITHUB_ENV
          echo "ANDROIDNDK=$NDK_PATH"            >> $GITHUB_ENV

          # Añadir aidl y platform-tools al PATH del runner
          echo "$ANDROID_SDK/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools"     >> $GITHUB_PATH

      # ── PASO 7: Restaurar Caché de Buildozer ─────────────────────────
      # NOTA: La caché guarda ~/.buildozer (que ahora contiene el symlink).
      # En un cache-hit, el symlink ya existe → el Paso 6 lo detecta y
      # no lo recrea, evitando conflictos.
      - name: 🗃️ Restaurar Caché de Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v13-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-${{ runner.os }}-

      # ── PASO 8: Construir APK Android (Debug) ────────────────────────
      # Buildozer lee ANDROIDSDK y ANDROIDNDK (no ANDROID_HOME).
      # Con el symlink del Paso 6, ~/.buildozer/.../android-sdk
      # apunta al SDK pre-instalado donde build-tools/33.0.2/aidl existe.
      - name: 🚀 Construir APK Android (Debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          BUILDOZER_WARN_ON_ROOT: 0

      # ── PASO 9: Localizar y copiar APK a carpeta conocida ────────────
      - name: 🔎 Localizar y Copiar APK
        run: |
          echo "══ Buscando archivos .apk en el workspace ══"
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          find "$HOME/.buildozer" -name "*.apk" 2>/dev/null || true

          echo "══ Copiando APK(s) a artifacts/ ══"
          mkdir -p artifacts

          if ls "$GITHUB_WORKSPACE"/bin/*.apk 1>/dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/bin/*.apk artifacts/
            echo "✅ APK copiado desde bin/"
          elif find "$HOME/.buildozer" -name "*.apk" | grep -q .; then
            find "$HOME/.buildozer" -name "*.apk" -exec cp {} artifacts/ \;
            echo "✅ APK copiado desde .buildozer interno"
          else
            echo "❌ No se encontró ningún .apk — el build falló"
            exit 1
          fi

          echo "══ Contenido de artifacts/ ══"
          ls -lh artifacts/

      # ── PASO 10: Mostrar log si el build falla ───────────────────────
      - name: 🐛 Mostrar Log (solo si falla el build)
        if: failure()
        run: |
          echo "══ Últimas 150 líneas del log de compilación ══"
          tail -150 build.log || echo "No se encontró build.log"

      # ── PASO 11: Subir APK como Artefacto descargable ────────────────
      - name: 📤 Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-v13-debug
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error
          overwrite: true
