# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v8                        ║
# ║                                                                      ║
# ║  Estrategia central: kivy/buildozer-action@v1                       ║
# ║  Esta acción oficial del equipo Kivy gestiona internamente:         ║
# ║    · Instalación de Buildozer (versión master)                      ║
# ║    · Descarga y configuración del Android SDK y NDK                 ║
# ║    · Aceptación automática de licencias (sin sdkmanager manual)     ║
# ║    · Ejecución del comando: android debug                           ║
# ║                                                                      ║
# ║  Fix sobre V6/V7:                                                   ║
# ║  · Eliminado el paso manual de sdkmanager que causaba el error      ║
# ║    "tools/bin/sdkmanager does not exist"                            ║
# ║  · Runner cambiado a ubuntu-latest (optimizado para esta acción)    ║
# ║  · Cache reseteada a v8- (descarta cache corrupta de V7)            ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v8 — kivy/buildozer-action)
    runs-on: ubuntu-latest

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Verificar archivos del repo ───────────────────────
      # Se ejecuta ANTES del build para detectar archivos faltantes
      # sin tener que esperar 40+ minutos de compilación.
      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la
          echo ""
          echo "── Archivos requeridos por buildozer.spec ──"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f — NO encontrado"
            fi
          done
          echo ""
          echo "── Primeras líneas de buildozer.spec ───"
          head -20 buildozer.spec

      # ── PASO 3: Restaurar caché ────────────────────────────────────
      # Key v8- descarta todo el cache de V7 que tenía el SDK corrupto.
      # La caché guarda el SDK, NDK, python-for-android y Gradle entre
      # runs para reducir el tiempo de compilación de ~50 min a ~10 min.
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v8-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v8-${{ runner.os }}-

      # ── PASO 4: COMPILAR APK — kivy/buildozer-action@v1 ──────────
      #
      # ESTRATEGIA CENTRAL v8:
      #
      # La acción kivy/buildozer-action@v1 es la solución oficial del
      # equipo de Kivy para compilar APKs en GitHub Actions. Elimina
      # todos los problemas de rutas que tuvimos en V6 y V7 porque:
      #
      #   · Instala Buildozer desde el repo de GitHub (master)
      #   · Configura el Android SDK en la ruta que Buildozer espera
      #   · Acepta las licencias automáticamente de forma interna
      #   · No requiere sdkmanager manual (elimina el error de V6/V7)
      #
      # Parámetros:
      #   filename          → ruta al buildozer.spec en el repo
      #   buildozer_version → "master" usa la versión más reciente del
      #                        repositorio (más compatible con p4a master)
      #   command           → comando buildozer a ejecutar
      #
      # TIEMPOS ESTIMADOS:
      #   · Run #1 sin caché : 40 – 60 minutos
      #   · Run #2+ con caché:  8 – 15 minutos
      # ─────────────────────────────────────────────────────────────
      - name: 🔨 Compilar APK con kivy/buildozer-action
        uses: kivy/buildozer-action@v1
        with:
          filename: buildozer.spec
          buildozer_version: master
          command: android debug

      # ── PASO 5: DEBUG WORKSPACE ────────────────────────────────────
      # Se ejecuta SIEMPRE (if: always()) — tanto si el build tuvo
      # éxito como si falló. Muestra exactamente qué generó el build.
      - name: 🔎 Debug Workspace — buscar APK generado
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  DEBUG WORKSPACE v8"
          echo "════════════════════════════════════════"

          echo ""
          echo "── bin/ ────────────────────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── find *.apk en workspace completo ────"
          find . -name "*.apk" 2>/dev/null \
            && echo "✅ APK(s) encontrado(s)" \
            || echo "⚠️  Ningún .apk encontrado en el workspace"

          echo ""
          echo "── Árbol del workspace (profundidad 2) ─"
          find . -maxdepth 2 \
            -not -path './.buildozer/*' \
            -not -path './.git/*' \
            | sort

      # ── PASO 6: Subir APK como artefacto ──────────────────────────
      # if-no-files-found: warn → el workflow no muere aquí
      # aunque no haya APK (el log del paso 5 ya explica por qué).
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberload-mstl-apk-v8
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── PASO 7: Subir logs de buildozer (siempre) ─────────────────
      # buildozer-action escribe el log en .buildozer/logs/
      # Descárgalo desde la sección "Artifacts" si el build falla.
      - name: 📄 Subir logs de buildozer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: buildozer-logs-v8
          path: |
            .buildozer/logs/
            .buildozer/android/platform/build-*/build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml   ← ESTE ARCHIVO
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png                ← OBLIGATORIO (buildozer.spec lo pide)
#    └── buildozer.spec
#
#  TIEMPOS ESPERADOS:
#    · Run #1 sin caché : 40 – 60 minutos
#    · Run #2+ con caché:  8 – 15 minutos
#
#  SI FALLA:
#    · Descarga "buildozer-logs-v8" desde la sección Artifacts del run
#    · Busca la primera línea que contenga "ERROR" o "Exception"
#    · El paso "Debug Workspace" muestra si bin/ existe o no
#
#  NOTA SOBRE icon.png:
#    Si no tienes icon.png en tu repo, el build fallará con:
#    "FileNotFoundError: icon.png". Añade cualquier PNG de 512x512
#    con ese nombre exacto en la raíz del repositorio.
# ──────────────────────────────────────────────────────────────────────
