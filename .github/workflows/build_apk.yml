# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v6                        ║
# ║  Estrategia: Buildozer gestiona el SDK completamente                ║
# ║  Fix: Eliminados todos los pasos manuales de SDK/sdkmanager        ║
# ║  Clave: yes | buildozer -v android debug                           ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v6 — Buildozer autónomo)
    runs-on: ubuntu-22.04

    env:
      # Buildozer lee estas variables para configurar el SDK sin prompts
      BUILDOZER_WARN_ON_ROOT:             "0"
      BUILDOZER_ANDROID_SDK_ACCEPT_LICENSE: "y"

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Java 17 oficial ────────────────────────────────────
      # setup-java configura JAVA_HOME automáticamente y de forma
      # persistente. Temurin = OpenJDK de Eclipse Foundation,
      # la distribución más estable y usada en CI en 2026.
      - name: ☕ Instalar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── PASO 3: Python 3.10 ────────────────────────────────────────
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── PASO 4: Dependencias del sistema ──────────────────────────
      # Lista mínima y estable confirmada en Ubuntu 22.04.
      # Sin gstreamer, sin lld, sin ncurses-dev (todos causaban
      # conflictos de "held broken packages" en versiones anteriores).
      - name: 🔧 Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt --fix-broken install -y -qq
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            curl \
            python3-pip \
            build-essential \
            ccache \
            autoconf \
            libtool \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libffi-dev \
            libltdl-dev \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libsqlite3-dev \
            patchelf \
            libncurses5 \
            libcurl4-openssl-dev
          echo "✅ Dependencias instaladas"

      # ── PASO 5: Instalar Buildozer y Cython ───────────────────────
      # Cython 0.29.37 = última versión de la rama 0.29.x.
      # Cython 3.x rompe las recetas nativas de python-for-android.
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer virtualenv
          echo "✅ Buildozer $(buildozer version) listo"

      # ── PASO 6: Verificar versiones ───────────────────────────────
      - name: 🔍 Verificar entorno
        run: |
          echo "── Python ──────────────────────────────"
          python --version
          echo "── Java ────────────────────────────────"
          java -version
          echo "── Buildozer ───────────────────────────"
          buildozer version
          echo "── Cython ──────────────────────────────"
          cython --version
          echo "── JAVA_HOME ───────────────────────────"
          echo "$JAVA_HOME"

      # ── PASO 7: Restaurar caché ────────────────────────────────────
      # Key v6- resetea cachés corruptos de versiones anteriores.
      # Si el caché de v5 existe, no lo reutilizamos porque contenía
      # un SDK parcialmente instalado que causaba los fallos.
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v6-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v6-${{ runner.os }}-

      # ── PASO 8: Verificar archivos del repo ───────────────────────
      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la
          echo ""
          echo "── Archivos requeridos por buildozer.spec"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f — NO encontrado"
            fi
          done

      # ── PASO 9: COMPILAR APK ───────────────────────────────────────
      #
      # ESTRATEGIA CENTRAL DE v6:
      #
      #   yes | buildozer -v android debug
      #
      # · "yes |"       → responde "y" automáticamente a CUALQUIER
      #                   prompt que Buildozer o sdkmanager lancen,
      #                   incluyendo licencias del SDK, NDK y
      #                   preguntas de confirmación de herramientas.
      #
      # · "buildozer"   → gestiona la descarga e instalación del SDK
      #                   y NDK completamente por sí solo. No
      #                   interferimos con su proceso interno.
      #
      # · "-v"          → verbose: muestra cada paso de compilación
      #                   en detalle para diagnóstico si algo falla.
      #
      # · "android debug" → genera APK en modo debug (firmado con
      #                   clave de debug, instalable directamente).
      #
      # · "2>&1 | tee"  → captura stdout + stderr en build.log
      #                   y los muestra en pantalla simultáneamente.
      #
      # NOTA: Este paso puede tardar 35-50 minutos en el primer
      # run (sin caché). Con caché tarda 8-15 minutos.
      - name: 🔨 Compilar APK con Buildozer
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "── Build finalizado ─────────────────────"

      # ── PASO 10: DEBUG WORKSPACE ───────────────────────────────────
      #
      # Se ejecuta SIEMPRE (if: always()) para ver exactamente
      # qué generó el build, tanto si tuvo éxito como si falló.
      #
      # Muestra:
      #   · Contenido de bin/ (donde Buildozer pone el APK)
      #   · Búsqueda de cualquier .apk en todo el workspace
      #   · Árbol de directorios nivel 2 (sin .buildozer ni .git)
      - name: 🔎 Debug Workspace — buscar APK generado
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  DEBUG WORKSPACE"
          echo "════════════════════════════════════════"

          echo ""
          echo "── bin/ ────────────────────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── find *.apk en workspace completo ────"
          find . -name "*.apk" 2>/dev/null \
            && echo "✅ APK(s) encontrado(s)" \
            || echo "⚠️  Ningún .apk encontrado en el workspace"

          echo ""
          echo "── Árbol del workspace (profundidad 2) ─"
          find . -maxdepth 2 \
            -not -path './.buildozer/*' \
            -not -path './.git/*' \
            | sort

          echo ""
          echo "── Últimas 50 líneas de build.log ──────"
          tail -50 build.log 2>/dev/null || echo "⚠️  build.log no encontrado"

      # ── PASO 11: Subir APK como artefacto ─────────────────────────
      # if-no-files-found: warn en lugar de error → el workflow
      # no muere aquí y el paso de logs siempre se ejecuta.
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberload-mstl-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── PASO 12: Subir log completo ────────────────────────────────
      - name: 📄 Subir log de build (siempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-v6
          path: build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml   ← ESTE ARCHIVO
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png
#    └── buildozer.spec
#
#  TIEMPOS ESPERADOS:
#    · Run #1 sin caché : 35 – 50 minutos
#    · Run #2+ con caché:  8 – 15 minutos
#
#  SI FALLA:
#    · Descarga "build-log-v6" desde la sección Artifacts del run
#    · Busca la primera línea que contenga "ERROR" o "Exception"
#    · Las últimas 50 líneas se muestran directamente en el
#      paso "Debug Workspace" sin necesidad de descargar el log
# ──────────────────────────────────────────────────────────────────────
