# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v10                       ║
# ║                                                                      ║
# ║  Fixes sobre V9:                                                     ║
# ║  · Java 17 → Java 11                                                ║
# ║    javax/xml/bind (JAXB) fue eliminado en Java 11+.                 ║
# ║    Buildozer usa AGP 7.x que solo es compatible con Java 11.        ║
# ║    Con Java 17 el build explota con NoClassDefFoundError.           ║
# ║  · FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true                          ║
# ║    Opt-in a Node.js 24 → elimina los 2 warnings de deprecación.    ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v10 — Java 11 + Node24)
    runs-on: ubuntu-22.04

    env:
      # ── Fix Node.js 20 deprecation warnings ──────────────────────
      # Hace opt-in inmediato a Node.js 24 en todas las actions.
      # Elimina los 2 warnings de "Node.js 20 deprecated" del runner.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      # ── Ruta del SDK ──────────────────────────────────────────────
      # Ruta EXACTA donde buildozer busca el SDK por defecto.
      # Al pre-instalar el SDK aquí, buildozer lo detecta sin re-descargarlo.
      ANDROID_SDK_ROOT: "/home/runner/.buildozer/android/platform/android-sdk"
      ANDROID_HOME:     "/home/runner/.buildozer/android/platform/android-sdk"

      # ── Variables de buildozer ────────────────────────────────────
      BUILDOZER_WARN_ON_ROOT:               "0"
      BUILDOZER_ANDROID_SDK_ACCEPT_LICENSE: "y"

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Java 11 (Temurin) ─────────────────────────────────
      #
      # FIX CRÍTICO v10: Java 17 → Java 11
      #
      # Por qué Java 11 y NO Java 17:
      #   · JAXB (javax.xml.bind) fue eliminado del JDK en Java 11+.
      #   · Buildozer genera internamente un proyecto Gradle que usa
      #     Android Gradle Plugin (AGP) 7.x.
      #   · AGP 7.x requiere Java 11. No es compatible con Java 17.
      #   · Con Java 17 el build lanza:
      #     "NoClassDefFoundError: javax/xml/bind/annotation/XmlSchema"
      #     y muere antes de compilar nada.
      #   · Con Java 11 AGP 7.x funciona correctamente.
      #
      # Por qué no Java 8:
      #   · AGP 7.x require Java 11 como mínimo.
      #   · Java 8 causaría otros errores de compatibilidad con Gradle.
      # ─────────────────────────────────────────────────────────────
      - name: ☕ Instalar Java 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      # ── PASO 3: Python 3.10 ────────────────────────────────────────
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── PASO 4: Dependencias del sistema ──────────────────────────
      - name: 🔧 Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt --fix-broken install -y -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip build-essential ccache \
            autoconf libtool cmake ninja-build pkg-config \
            libssl-dev libffi-dev libltdl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libsqlite3-dev \
            patchelf libncurses5 libcurl4-openssl-dev
          echo "✅ Dependencias del sistema instaladas"

      # ── PASO 5: Instalar Buildozer y Cython ───────────────────────
      # Cython 0.29.37 = última de la rama 0.29.x.
      # Cython 3.x rompe las recetas nativas de python-for-android.
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer virtualenv
          echo "✅ Buildozer $(buildozer version) + Cython 0.29.37 listos"

      # ── PASO 6: Verificar entorno ──────────────────────────────────
      - name: 🔍 Verificar versiones del entorno
        run: |
          echo "── Java ────────────────────────────────"
          java -version
          echo "── Python ──────────────────────────────"
          python --version
          echo "── Buildozer ───────────────────────────"
          buildozer version
          echo "── Cython ──────────────────────────────"
          cython --version
          echo "── JAVA_HOME ───────────────────────────"
          echo "$JAVA_HOME"

      # ── PASO 7: Restaurar caché ────────────────────────────────────
      # Key v10- descarta la caché de V9 que fue generada con Java 17
      # (archivos Gradle compilados con Java 17 no son compatibles con 11).
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v10-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v10-${{ runner.os }}-

      # ── PASO 8: Verificar archivos del repo ───────────────────────
      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la
          echo ""
          echo "── Archivos requeridos por buildozer.spec ──"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f — NO encontrado"
            fi
          done

      # ── PASO 9: CONFIGURAR ANDROID SDK ────────────────────────────
      #
      # FIX ORIGINAL DE V9 (mantenido):
      #   Instala el paquete "tools" que crea tools/bin/sdkmanager,
      #   el binario que buildozer busca y que NO existía en V6/V7/V8.
      #
      # Flujo:
      #   1. Instalar cmdline-tools/latest → sdkmanager moderno
      #   2. sdkmanager --licenses          → aceptar licencias
      #   3. sdkmanager "tools"             → crear tools/bin/sdkmanager
      #   4. Pre-instalar componentes       → evitar prompts en el build
      # ─────────────────────────────────────────────────────────────
      - name: 🔐 Configurar Android SDK + Aceptar licencias
        run: |
          echo "════════════════════════════════════════════"
          echo " PASO 9 — Configuración del Android SDK"
          echo "════════════════════════════════════════════"

          echo ""
          echo "── Creando estructura SDK en: $ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          echo ""
          echo "── Descargando Android cmdline-tools..."
          wget -q \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdlinetools.zip
          unzip -q /tmp/cmdlinetools.zip -d /tmp/ct_extract
          mv /tmp/ct_extract/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/ct_extract /tmp/cmdlinetools.zip
          echo "  ✅ cmdline-tools/latest instalado"

          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          echo ""
          echo "── Aceptando licencias Android SDK..."
          yes | sdkmanager --licenses || true
          echo "  ✅ Licencias aceptadas"

          echo ""
          echo "── Instalando paquete 'tools' (FIX: tools/bin/sdkmanager)..."
          sdkmanager "tools"
          if [ -f "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            echo "  ✅ VERIFICADO: tools/bin/sdkmanager existe"
          else
            echo "  ❌ ERROR: tools/bin/sdkmanager NO encontrado"
          fi

          echo ""
          echo "── Pre-instalando componentes del SDK..."
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"
          echo "  ✅ Componentes pre-instalados"

          echo ""
          echo "── Estructura SDK (nivel 2) ────────────────────────"
          find "$ANDROID_SDK_ROOT" -maxdepth 2 -type d | sort

      # ── PASO 10: COMPILAR APK ──────────────────────────────────────
      - name: 🔨 Compilar APK con Buildozer
        run: |
          echo "── Iniciando buildozer android debug ───"
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "── Build finalizado ─────────────────────"

      # ── PASO 11: DEBUG WORKSPACE ───────────────────────────────────
      - name: 🔎 Debug Workspace — buscar APK generado
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  DEBUG WORKSPACE v10"
          echo "════════════════════════════════════════"

          echo ""
          echo "── bin/ ────────────────────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── find *.apk en workspace completo ────"
          find . -name "*.apk" 2>/dev/null \
            && echo "✅ APK(s) encontrado(s)" \
            || echo "⚠️  Ningún .apk encontrado"

          echo ""
          echo "── Árbol del workspace (profundidad 2) ─"
          find . -maxdepth 2 \
            -not -path './.buildozer/*' \
            -not -path './.git/*' \
            | sort

          echo ""
          echo "── Últimas 80 líneas de build.log ──────"
          tail -80 build.log 2>/dev/null || echo "⚠️  build.log no encontrado"

      # ── PASO 12: Subir APK como artefacto ─────────────────────────
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberload-mstl-apk-v10
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── PASO 13: Subir log de build ───────────────────────────────
      - name: 📄 Subir log de build (siempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-v10
          path: build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png              ← OBLIGATORIO (PNG de 512x512)
#    └── buildozer.spec
#
#  TIEMPOS ESPERADOS:
#    · Run #1 sin caché : 40 – 60 minutos
#    · Run #2+ con caché:  8 – 15 minutos
#
#  SI FALLA:
#    · Descarga "build-log-v10" desde la sección Artifacts del run
#    · Busca la primera línea con "ERROR" o "Exception"
# ──────────────────────────────────────────────────────────────────────
