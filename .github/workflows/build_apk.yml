# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions Workflow — CYBERLOAD MSTL v13.0                     ║
# ║  Automatiza la construcción del APK con Buildozer en Ubuntu          ║
# ║                                                                      ║
# ║  Ruta en tu repo: .github/workflows/build_apk.yml                   ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build Android APK

# ── Activador ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

# ── Trabajo principal ──────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Cyberload MSTL v13 APK
    runs-on: ubuntu-latest

    # ── Fix warning: Node.js 20 deprecado ────────────────────────────
    # Fuerza todas las actions (checkout, cache, etc.) a usar Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ── PASO 1: Clonar el repositorio ────────────────────────────────
      - name: 🔍 Checkout del Repositorio
        uses: actions/checkout@v4

      # ── PASO 2: Configurar Python 3.9 ────────────────────────────────
      - name: 🐍 Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── PASO 3: Instalar Buildozer y Cython ──────────────────────────
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.19

      # ── PASO 4: Instalar dependencias del sistema (apt-get) ───────────
      - name: 🔧 Instalar Dependencias del Sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev
          sudo apt-get install -y libffi8 || sudo apt-get install -y libffi6 || true

      # ── PASO 5: Configurar Java 17 ────────────────────────────────────
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── PASO 6: Configurar Android SDK y Build Tools ─────────────────
      # CRÍTICO — Fix del error "Aidl not found":
      #
      # 'aidl' es un binario que viene dentro de build-tools/33.0.2.
      # El runner de GitHub tiene el SDK pre-instalado en:
      #   /usr/local/lib/android/sdk
      # pero no siempre incluye la versión exacta de build-tools
      # que el buildozer.spec requiere (33.0.2).
      #
      # Este paso:
      #   1. Apunta ANDROID_HOME al SDK pre-instalado del runner.
      #   2. Instala build-tools;33.0.2, platforms;android-33 y
      #      platform-tools via sdkmanager.
      #   3. Añade build-tools/33.0.2 al PATH → 'aidl' queda accesible.
      #   4. Acepta todas las licencias del SDK.
      #   5. Verifica que 'aidl' existe antes de que Buildozer arranque.
      - name: 📱 Configurar Android SDK y Build Tools
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME

          # Registrar variables en el entorno de pasos posteriores
          echo "ANDROID_HOME=$ANDROID_HOME"         >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # Añadir build-tools y platform-tools al PATH global del runner
          echo "$ANDROID_HOME/build-tools/33.0.2"  >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools"       >> $GITHUB_PATH

          # Aceptar todas las licencias del SDK
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # Instalar las herramientas requeridas por buildozer.spec
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools"

          # Verificar que 'aidl' existe y es ejecutable
          echo "══ Verificando 'aidl' ══"
          ls -la "$ANDROID_HOME/build-tools/33.0.2/aidl" \
            && echo "✅ aidl encontrado correctamente" \
            || echo "❌ aidl NO encontrado — revisar build-tools"

      # ── PASO 7: Restaurar Caché de Buildozer ─────────────────────────
      - name: 🗃️ Restaurar Caché de Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v13-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-${{ runner.os }}-

      # ── PASO 8: Construir APK Android (Debug) ────────────────────────
      # set -o pipefail → el paso falla con el exit code real de
      # buildozer y no el de 'tee' (que siempre devuelve 0).
      - name: 🚀 Construir APK Android (Debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          BUILDOZER_WARN_ON_ROOT: 0

      # ── PASO 9: Localizar y copiar APK a carpeta conocida ────────────
      - name: 🔎 Localizar y Copiar APK
        run: |
          echo "══ Buscando archivos .apk en el workspace ══"
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          find "$HOME/.buildozer" -name "*.apk" 2>/dev/null || true

          echo "══ Copiando APK(s) a artifacts/ ══"
          mkdir -p artifacts

          if ls "$GITHUB_WORKSPACE"/bin/*.apk 1>/dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/bin/*.apk artifacts/
            echo "✅ APK copiado desde bin/"
          elif find "$HOME/.buildozer" -name "*.apk" | grep -q .; then
            find "$HOME/.buildozer" -name "*.apk" -exec cp {} artifacts/ \;
            echo "✅ APK copiado desde .buildozer interno"
          else
            echo "❌ No se encontró ningún .apk — el build falló"
            exit 1
          fi

          echo "══ Contenido de artifacts/ ══"
          ls -lh artifacts/

      # ── PASO 10: Mostrar log si el build falla ───────────────────────
      - name: 🐛 Mostrar Log (solo si falla el build)
        if: failure()
        run: |
          echo "══ Últimas 150 líneas del log de compilación ══"
          tail -150 build.log || echo "No se encontró build.log"

      # ── PASO 11: Subir APK como Artefacto descargable ────────────────
      - name: 📤 Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-v13-debug
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error
          overwrite: true
