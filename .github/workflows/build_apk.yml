# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v5                        ║
# ║  Fix: Instalación correcta de Android cmdline-tools                 ║
# ║       Rutas verificadas, PATH persistente, Java oficial             ║
# ║  Método: SDK manual en ruta exacta de Buildozer + setup-java@v4    ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v5 — SDK paths verificados)
    runs-on: ubuntu-22.04

    # ── Variables de entorno globales ─────────────────────────────────
    # ANDROID_HOME apunta a la ruta EXACTA que Buildozer usa
    # internamente para buscar SDK, sdkmanager y build-tools.
    # Todas las variables se definen aquí una sola vez.
    env:
      ANDROID_HOME:                  /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT:              /home/runner/.buildozer/android/platform/android-sdk
      BUILDOZER_WARN_ON_ROOT:        "0"
      BUILDOZER_ANDROID_API:         "33"
      BUILDOZER_ANDROID_MINAPI:      "26"
      BUILDOZER_ANDROID_NDK_VERSION: "25b"

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Instalar Java 17 (acción oficial) ──────────────────
      # setup-java@v4 configura JAVA_HOME automáticamente y de forma
      # persistente en todo el workflow — sin necesidad de exportarlo
      # manualmente en cada paso posterior.
      - name: ☕ Instalar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── PASO 3: Configurar Python 3.10 ────────────────────────────
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── PASO 4: Sanear sistema de paquetes ─────────────────────────
      - name: 🧹 Sanear sistema de paquetes
        run: |
          sudo apt-get update -qq
          sudo apt --fix-broken install -y -qq
          echo "✅ Sistema de paquetes saneado"

      # ── PASO 5: Instalar dependencias del sistema ──────────────────
      # Lista depurada v5: sin gstreamer, sin lld, sin ncurses-dev.
      # Solo paquetes confirmados como no-conflictivos en Ubuntu 22.04.
      - name: 🔧 Instalar dependencias del sistema
        run: |
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            curl \
            python3-pip \
            build-essential \
            ccache \
            autoconf \
            libtool \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libffi-dev \
            libltdl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libsqlite3-dev \
            patchelf \
            libncurses5
          echo "✅ Dependencias del sistema instaladas"

      # ── PASO 6: Instalar Buildozer, Cython y herramientas Python ───
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer virtualenv colorama
          echo "✅ Buildozer $(buildozer version) instalado"

      # ── PASO 7: Restaurar caché ────────────────────────────────────
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v5-${{ runner.os }}-

      # ── PASO 8: Instalar Android cmdline-tools ─────────────────────
      #
      # FIX PRINCIPAL de v5:
      #
      # El ZIP oficial contiene internamente una carpeta llamada
      # "cmdline-tools/" con los binarios adentro. La estructura
      # final requerida por sdkmanager y Buildozer es:
      #
      #   $ANDROID_HOME/
      #   └── cmdline-tools/
      #       └── latest/
      #           ├── bin/
      #           │   ├── sdkmanager   ← lo que necesitamos verificar
      #           │   └── avdmanager
      #           └── lib/
      #
      # El paso hace:
      #   1. Crear la carpeta destino con mkdir -p
      #   2. Descargar el ZIP con wget
      #   3. Descomprimir en /tmp (estructura interna: cmdline-tools/)
      #   4. Mover el CONTENIDO de cmdline-tools/ a latest/
      #   5. Verificar que sdkmanager existe en la ruta correcta
      #   6. Añadir bin/ al PATH global con $GITHUB_PATH
      - name: 📱 Instalar Android cmdline-tools en ruta de Buildozer
        run: |
          # ── Rutas ─────────────────────────────────────────────────
          TOOLS_ZIP_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          SDK_DIR="$ANDROID_HOME"
          LATEST_DIR="$SDK_DIR/cmdline-tools/latest"

          # ── Crear estructura de carpetas ───────────────────────────
          mkdir -p "$LATEST_DIR"
          mkdir -p "$SDK_DIR/licenses"
          mkdir -p "$HOME/.android"
          touch    "$HOME/.android/repositories.cfg"

          echo "📁 Estructura creada en: $SDK_DIR"

          # ── Descargar ZIP ──────────────────────────────────────────
          echo "⬇️  Descargando cmdline-tools..."
          wget -q "$TOOLS_ZIP_URL" -O /tmp/cmdline-tools.zip
          echo "✅ ZIP descargado"

          # ── Descomprimir en carpeta temporal ──────────────────────
          rm -rf /tmp/cmdline-tools-extracted
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extracted

          echo "── Estructura interna del ZIP ──────────"
          ls -la /tmp/cmdline-tools-extracted/
          ls -la /tmp/cmdline-tools-extracted/cmdline-tools/ 2>/dev/null || true

          # ── Copiar contenido a la ruta "latest" ───────────────────
          # El ZIP contiene una carpeta "cmdline-tools/" con bin/ y lib/
          # dentro. Copiamos el CONTENIDO (no la carpeta) a latest/.
          cp -r /tmp/cmdline-tools-extracted/cmdline-tools/. "$LATEST_DIR/"

          # ── Limpiar temporales ────────────────────────────────────
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-extracted

          # ── Verificar que sdkmanager existe ───────────────────────
          echo "── Verificando ruta de sdkmanager ──────"
          ls -la "$LATEST_DIR/bin/"

          if [ ! -f "$LATEST_DIR/bin/sdkmanager" ]; then
            echo "❌ ERROR: sdkmanager no encontrado en $LATEST_DIR/bin/"
            echo "── Árbol de $SDK_DIR ─────────────────"
            find "$SDK_DIR" -maxdepth 5 | sort
            exit 1
          fi

          echo "✅ sdkmanager encontrado en: $LATEST_DIR/bin/sdkmanager"

          # ── Dar permisos de ejecución ─────────────────────────────
          chmod +x "$LATEST_DIR/bin/"*

          # ── Añadir al PATH global del runner (persiste en todos los pasos)
          echo "$LATEST_DIR/bin" >> $GITHUB_PATH
          echo "✅ $LATEST_DIR/bin añadido al PATH global"

      # ── PASO 9: Verificar sdkmanager en PATH ──────────────────────
      - name: 🔍 Verificar sdkmanager accesible en PATH
        run: |
          echo "── PATH actual ─────────────────────────"
          echo "$PATH"
          echo ""
          echo "── Ubicación de sdkmanager ─────────────"
          which sdkmanager || echo "⚠️  sdkmanager no está en PATH"
          sdkmanager --version || echo "⚠️  sdkmanager --version falló"

      # ── PASO 10: Aceptar todas las licencias Android SDK ───────────
      #
      # Se ejecuta DESPUÉS de instalar sdkmanager (a diferencia de
      # v3/v4 donde se escribían hashes antes de que el SDK existiera).
      #
      # Doble estrategia:
      #   A) "yes | sdkmanager --licenses" → acepta todo interactivamente
      #   B) Escribir hashes directamente  → fallback si sdkmanager falla
      - name: 🔐 Aceptar licencias Android SDK
        run: |
          SDK_DIR="$ANDROID_HOME"

          # ── Estrategia A: sdkmanager --licenses ───────────────────
          echo "── Aceptando licencias via sdkmanager ──"
          yes | sdkmanager \
            --licenses \
            --sdk_root="$SDK_DIR" 2>&1 || true

          # ── Estrategia B: hashes directos (fallback) ───────────────
          echo "── Escribiendo hashes de licencia ──────"
          mkdir -p "$SDK_DIR/licenses"

          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > "$SDK_DIR/licenses/android-sdk-license"

          printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK_DIR/licenses/android-sdk-preview-license"

          printf "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > "$SDK_DIR/licenses/intel-android-extra-license"

          echo "── Licencias escritas ──────────────────"
          ls -la "$SDK_DIR/licenses/"
          echo "✅ Licencias aceptadas"

      # ── PASO 11: Verificar archivos del repo ───────────────────────
      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la

          echo ""
          echo "── Archivos requeridos ─────────────────"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f NO encontrado — el build fallará"
            fi
          done

      # ── PASO 12: Compilar APK ──────────────────────────────────────
      #
      # Sin "buildozer android update" previo: Buildozer encontrará
      # el SDK ya instalado en $ANDROID_HOME y pasará directo a compilar.
      #
      # "2>&1 | tee build.log" captura stdout + stderr en el log
      # y los muestra en pantalla simultáneamente.
      - name: 🔨 Compilar APK (buildozer -v android debug)
        run: |
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          echo "── Entorno de compilación ──────────────"
          echo "  JAVA_HOME      = $JAVA_HOME"
          echo "  ANDROID_HOME   = $ANDROID_HOME"
          echo "  sdkmanager     = $(which sdkmanager 2>/dev/null || echo NO_ENCONTRADO)"

          echo ""
          echo "── Iniciando Buildozer ──────────────────"
          buildozer -v android debug 2>&1 | tee build.log
          echo "── Build finalizado ─────────────────────"

      # ── PASO 13: Verificar APKs generados ─────────────────────────
      - name: 📋 Verificar APKs generados
        run: |
          echo "── Contenido de bin/ ───────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── Todos los .apk en el workspace ──────"
          find . -name "*.apk" 2>/dev/null || echo "⚠️  Ningún .apk encontrado"

      # ── PASO 14: Subir APK como artefacto ─────────────────────────
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── PASO 15: Subir logs (siempre, incluso si falla) ────────────
      - name: 📄 Subir logs (siempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-v5
          path: |
            build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml   ← ESTE ARCHIVO
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png
#    └── buildozer.spec
# ──────────────────────────────────────────────────────────────────────
