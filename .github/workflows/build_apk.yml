# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions Workflow — CYBERLOAD MSTL v13.0                     ║
# ║  Automatiza la construcción del APK con Buildozer en Ubuntu          ║
# ║                                                                      ║
# ║  Ruta en tu repo: .github/workflows/build_apk.yml                   ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build Android APK

# ── Activador ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

# ── Trabajo principal ──────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Cyberload MSTL v13 APK
    runs-on: ubuntu-latest

    steps:

      # ── PASO 1: Clonar el repositorio ────────────────────────────────
      - name: 🔍 Checkout del Repositorio
        uses: actions/checkout@v4

      # ── PASO 2: Configurar Python 3.9 ────────────────────────────────
      - name: 🐍 Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── PASO 3: Instalar Buildozer y Cython ──────────────────────────
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.19

      # ── PASO 4: Instalar dependencias del sistema (apt-get) ───────────
      - name: 🔧 Instalar Dependencias del Sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev
          sudo apt-get install -y libffi8 || sudo apt-get install -y libffi6 || true

      # ── PASO 5: Configurar Java 17 ────────────────────────────────────
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── PASO 6: Restaurar Caché de Buildozer ─────────────────────────
      - name: 🗃️ Restaurar Caché de Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v13-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-${{ runner.os }}-

      # ── PASO 7: Aceptar Licencias Android SDK ────────────────────────
      - name: 📜 Aceptar Licencias Android SDK
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          if [ -d "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" ]; then
            yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi

      # ── PASO 8: Construir APK Android (Debug) ────────────────────────
      # CRÍTICO: 'set -o pipefail' hace que el paso falle con el exit
      # code real de buildozer y no el de 'tee' (que siempre es 0).
      - name: 🚀 Construir APK Android (Debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          BUILDOZER_WARN_ON_ROOT: 0

      # ── PASO 9: Localizar APK y copiar a carpeta conocida ────────────
      # Buildozer puede guardar el APK en rutas distintas según versión:
      #   · bin/*.apk  (ruta estándar)
      #   · .buildozer/android/platform/build-*/dists/*/bin/*.apk
      # Este paso busca en TODO el workspace y copia a artifacts/.
      - name: 🔎 Localizar y Copiar APK
        run: |
          echo "══ Buscando archivos .apk en el workspace ══"
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          find "$HOME/.buildozer" -name "*.apk" 2>/dev/null || true

          echo "══ Copiando APK(s) encontrado(s) a artifacts/ ══"
          mkdir -p artifacts

          # Buscar en bin/ primero (ruta estándar de Buildozer)
          if ls "$GITHUB_WORKSPACE"/bin/*.apk 1>/dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/bin/*.apk artifacts/
            echo "✅ APK copiado desde bin/"

          # Buscar en rutas internas de .buildozer como fallback
          elif find "$HOME/.buildozer" -name "*.apk" | grep -q .; then
            find "$HOME/.buildozer" -name "*.apk" -exec cp {} artifacts/ \;
            echo "✅ APK copiado desde .buildozer interno"

          else
            echo "❌ No se encontró ningún .apk — el build falló"
            exit 1
          fi

          echo "══ Contenido de artifacts/ ══"
          ls -lh artifacts/

      # ── PASO 10: Mostrar log si el build falla ───────────────────────
      - name: 🐛 Mostrar Log (solo si falla el build)
        if: failure()
        run: |
          echo "══ Últimas 150 líneas del log de compilación ══"
          tail -150 build.log || echo "No se encontró build.log"

      # ── PASO 11: Subir APK como Artefacto descargable ────────────────
      # Sube desde artifacts/ — ruta garantizada por el Paso 9.
      - name: 📤 Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-v13-debug
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error
          overwrite: true
