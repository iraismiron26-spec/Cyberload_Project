# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v12                       ║
# ║                                                                      ║
# ║  Fix vs V11 — APK no se generaba sin error visible:                 ║
# ║  · Añadido "set -o pipefail" al paso de compilación                 ║
# ║    yes | buildozer | tee enmascaraba el exit code de buildozer      ║
# ║    → ahora si buildozer falla el paso muestra error real            ║
# ║  · Buildozer sigue siendo autónomo (sin SDK manual)                 ║
# ║  · Java 11 mantenido (fix JAXB de V10)                             ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v12 — pipefail fix)
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BUILDOZER_ANDROID_SDK_ACCEPT_LICENSE: "y"
      BUILDOZER_WARN_ON_ROOT: "0"

    steps:

      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Java 11 — NO Java 17.
      # AGP 7.x (usado por buildozer) solo es compatible con Java 11.
      - name: ☕ Instalar Java 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🔧 Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt --fix-broken install -y -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip build-essential ccache \
            autoconf libtool cmake ninja-build pkg-config \
            libssl-dev libffi-dev libltdl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libsqlite3-dev \
            patchelf libncurses5 libcurl4-openssl-dev
          echo "✅ Dependencias del sistema instaladas"

      # Cython 0.29.37 — NO Cython 3.x (rompe recetas de p4a)
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer virtualenv
          echo "✅ Buildozer $(buildozer version) + Cython 0.29.37 listos"

      - name: 🔍 Verificar versiones del entorno
        run: |
          echo "── Java ──────────────────────────────────"
          java -version
          echo "── Python ────────────────────────────────"
          python --version
          echo "── Buildozer ─────────────────────────────"
          buildozer version
          echo "── Cython ────────────────────────────────"
          cython --version

      # Key v12- → reset de caché de V11 (generada con build incompleto)
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v12-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v12-${{ runner.os }}-

      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la
          echo ""
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            [ -f "$f" ] && echo "  ✅ $f" || echo "  ❌ $f — NO encontrado"
          done

      # ── PASO DE COMPILACIÓN — FIX CRÍTICO v12 ─────────────────────
      #
      # PROBLEMA DE V11:
      #   yes | buildozer -v android debug 2>&1 | tee build.log
      #   El exit code de este pipeline es el de "tee" (siempre 0).
      #   Si buildozer falla internamente, el paso reporta "success"
      #   y GitHub Actions no muestra ningún error → APK nunca se genera
      #   pero el workflow termina "verde".
      #
      # FIX v12:
      #   "set -o pipefail" hace que el pipeline propague el exit code
      #   del primer comando que falle (buildozer en este caso).
      #   Si buildozer retorna 1, el paso entero retorna 1 → error visible.
      # ─────────────────────────────────────────────────────────────
      - name: 🔨 Compilar APK con Buildozer
        run: |
          set -o pipefail
          echo "── Iniciando compilación ───────────────"
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "── Compilación finalizada con éxito ─────"

      - name: 🔎 Debug Workspace — buscar APK generado
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  DEBUG WORKSPACE v12"
          echo "════════════════════════════════════════"
          echo ""
          echo "── bin/ ────────────────────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"
          echo ""
          echo "── find *.apk ──────────────────────────"
          find . -name "*.apk" 2>/dev/null \
            && echo "✅ APK encontrado" \
            || echo "⚠️  Ningún .apk encontrado"
          echo ""
          echo "── Últimas 100 líneas de build.log ─────"
          tail -100 build.log 2>/dev/null || echo "⚠️  build.log no encontrado"

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberload-mstl-apk-v12
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📄 Subir log de build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-v12
          path: build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/workflows/build_apk.yml
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png       ← OBLIGATORIO
#    └── buildozer.spec
# ──────────────────────────────────────────────────────────────────────
