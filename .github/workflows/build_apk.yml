# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CYBERLOAD MSTL — GitHub Actions Workflow v9                        ║
# ║                                                                      ║
# ║  FIX DEFINITIVO vs V6/V7/V8:                                        ║
# ║  · Instala el paquete SDK "tools" via sdkmanager                    ║
# ║    → crea tools/bin/sdkmanager que buildozer busca                  ║
# ║  · SDK instalado en la ruta EXACTA que buildozer espera             ║
# ║    (~/.buildozer/android/platform/android-sdk)                      ║
# ║  · Componentes pre-instalados antes del build para evitar           ║
# ║    prompts interactivos de sdkmanager durante la compilación        ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Build Cyberload MSTL APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: 🏗️ Compilar APK (v9 — SDK tools fix)
    runs-on: ubuntu-22.04

    env:
      # ── Ruta del SDK ──────────────────────────────────────────────
      # Esta es la ruta EXACTA donde buildozer busca el SDK por defecto.
      # Al instalarlo aquí, buildozer lo detecta y NO lo re-descarga.
      ANDROID_SDK_ROOT: "/home/runner/.buildozer/android/platform/android-sdk"
      ANDROID_HOME:     "/home/runner/.buildozer/android/platform/android-sdk"

      # ── Variables de buildozer ────────────────────────────────────
      BUILDOZER_WARN_ON_ROOT:               "0"
      BUILDOZER_ANDROID_SDK_ACCEPT_LICENSE: "y"

    steps:

      # ── PASO 1: Clonar repositorio ─────────────────────────────────
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PASO 2: Java 17 (Temurin) ─────────────────────────────────
      - name: ☕ Instalar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── PASO 3: Python 3.10 ────────────────────────────────────────
      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── PASO 4: Dependencias del sistema ──────────────────────────
      - name: 🔧 Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt --fix-broken install -y -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip build-essential ccache \
            autoconf libtool cmake ninja-build pkg-config \
            libssl-dev libffi-dev libltdl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libsqlite3-dev \
            patchelf libncurses5 libcurl4-openssl-dev
          echo "✅ Dependencias del sistema instaladas"

      # ── PASO 5: Instalar Buildozer y Cython ───────────────────────
      # Cython 0.29.37 = última versión de la rama 0.29.x.
      # Cython 3.x rompe las recetas nativas de python-for-android.
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer virtualenv
          echo "✅ Buildozer $(buildozer version) + Cython 0.29.37 listos"

      # ── PASO 6: Restaurar caché ────────────────────────────────────
      # Key v9- descarta la caché corrupta de V7/V8.
      - name: 💾 Restaurar caché (SDK / NDK / p4a / Gradle)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v9-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v9-${{ runner.os }}-

      # ── PASO 7: Verificar archivos del repo ───────────────────────
      - name: ⚙️ Verificar archivos del repo
        run: |
          echo "── Archivos en la raíz ─────────────────"
          ls -la
          echo ""
          echo "── Archivos requeridos por buildozer.spec ──"
          for f in main.py mstl_logic.py buildozer.spec icon.png; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f — NO encontrado"
            fi
          done

      # ── PASO 8: CONFIGURAR ANDROID SDK (FIX DEFINITIVO) ───────────
      #
      # DIAGNÓSTICO DEL ERROR DE V6/V7:
      #   buildozer buscaba: tools/bin/sdkmanager
      #   Nosotros instalamos: cmdline-tools/latest/bin/sdkmanager
      #   Resultado: "sdkmanager path does not exist" → fallo en 2 min
      #
      # POR QUÉ FALLABA:
      #   Google dividió el SDK Tools en dos paquetes:
      #   · "tools"        → tools/bin/sdkmanager (el que buscaba buildozer)
      #   · "cmdline-tools" → cmdline-tools/latest/bin/sdkmanager (el moderno)
      #   En V6/V7 instalamos solo cmdline-tools. Buildozer busca tools/.
      #
      # FIX V9 — DOS PASOS CRÍTICOS:
      #   1. Instalar cmdline-tools/latest → nos da sdkmanager moderno
      #   2. sdkmanager "tools" → instala el paquete "tools" antiguo que
      #      crea tools/bin/sdkmanager → el archivo que buildozer necesita
      #
      # COMPONENTES PRE-INSTALADOS:
      #   Instalamos platform-tools, android-33 y build-tools antes del
      #   build para que buildozer no tenga que llamar a sdkmanager de
      #   forma interactiva durante la compilación.
      #
      # UBICACIÓN DEL SDK:
      #   ~/.buildozer/android/platform/android-sdk → ruta por defecto
      #   que buildozer espera. Al instalarlo aquí no lo re-descarga.
      # ─────────────────────────────────────────────────────────────
      - name: 🔐 Configurar Android SDK + Aceptar licencias
        run: |
          echo "════════════════════════════════════════════"
          echo " PASO 8 — Configuración del Android SDK"
          echo "════════════════════════════════════════════"

          # ── Crear estructura del SDK ─────────────────────────────
          echo ""
          echo "── Creando estructura SDK en: $ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # ── Descargar e instalar cmdline-tools ───────────────────
          echo ""
          echo "── Descargando Android cmdline-tools..."
          wget -q \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdlinetools.zip
          unzip -q /tmp/cmdlinetools.zip -d /tmp/ct_extract
          mv /tmp/ct_extract/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/ct_extract /tmp/cmdlinetools.zip
          echo "  ✅ cmdline-tools/latest instalado"

          # ── Exportar PATH con sdkmanager moderno ─────────────────
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          echo "  sdkmanager (nuevo): $(which sdkmanager)"

          # ── Aceptar TODAS las licencias ──────────────────────────
          echo ""
          echo "── Aceptando licencias Android SDK..."
          yes | sdkmanager --licenses || true
          echo "  ✅ Licencias aceptadas"

          # ── FIX CRÍTICO: Instalar paquete "tools" ────────────────
          # Este paso crea tools/bin/sdkmanager — el binario que
          # buildozer busca y que causó el fallo en V6/V7/V8.
          echo ""
          echo "── Instalando paquete 'tools' (FIX: tools/bin/sdkmanager)..."
          sdkmanager "tools"
          echo "  ✅ tools/bin/sdkmanager creado"

          # ── Verificar que el archivo existe ──────────────────────
          if [ -f "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            echo "  ✅ VERIFICADO: $ANDROID_SDK_ROOT/tools/bin/sdkmanager existe"
          else
            echo "  ❌ ERROR: tools/bin/sdkmanager NO encontrado — revisar instalación"
          fi

          # ── Pre-instalar componentes requeridos ──────────────────
          # Instalamos estos antes del build para evitar que buildozer
          # los descargue de forma interactiva durante la compilación.
          echo ""
          echo "── Pre-instalando componentes del SDK..."
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"
          echo "  ✅ Componentes del SDK pre-instalados"

          # ── Verificación final ───────────────────────────────────
          echo ""
          echo "── Estructura del SDK (nivel 2) ────────────────────"
          find "$ANDROID_SDK_ROOT" -maxdepth 2 -type d | sort

      # ── PASO 9: COMPILAR APK ───────────────────────────────────────
      #
      # "yes |" responde automáticamente a cualquier prompt residual
      # que buildozer o sdkmanager puedan lanzar durante el build.
      # "-v" muestra cada paso en detalle para diagnóstico.
      # "2>&1 | tee build.log" captura stdout+stderr simultáneamente.
      # ─────────────────────────────────────────────────────────────
      - name: 🔨 Compilar APK con Buildozer
        run: |
          echo "── Iniciando buildozer android debug ───"
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "── Build finalizado ─────────────────────"

      # ── PASO 10: DEBUG WORKSPACE ───────────────────────────────────
      - name: 🔎 Debug Workspace — buscar APK generado
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  DEBUG WORKSPACE v9"
          echo "════════════════════════════════════════"

          echo ""
          echo "── bin/ ────────────────────────────────"
          ls -lah bin/ 2>/dev/null || echo "⚠️  bin/ no existe"

          echo ""
          echo "── find *.apk en workspace completo ────"
          find . -name "*.apk" 2>/dev/null \
            && echo "✅ APK(s) encontrado(s)" \
            || echo "⚠️  Ningún .apk encontrado en el workspace"

          echo ""
          echo "── Árbol del workspace (profundidad 2) ─"
          find . -maxdepth 2 \
            -not -path './.buildozer/*' \
            -not -path './.git/*' \
            | sort

          echo ""
          echo "── Últimas 80 líneas de build.log ──────"
          tail -80 build.log 2>/dev/null || echo "⚠️  build.log no encontrado"

      # ── PASO 11: Subir APK como artefacto ─────────────────────────
      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cyberload-mstl-apk-v9
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── PASO 12: Subir log de build ───────────────────────────────
      - name: 📄 Subir log de build (siempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-v9
          path: build.log
          retention-days: 14
          if-no-files-found: warn

# ──────────────────────────────────────────────────────────────────────
#  ESTRUCTURA REQUERIDA EN TU REPO
#  ─────────────────────────────────────────────────────────────────────
#    tu-repo/
#    ├── .github/
#    │   └── workflows/
#    │       └── build_apk.yml   ← ESTE ARCHIVO
#    ├── main.py
#    ├── mstl_logic.py
#    ├── icon.png                ← OBLIGATORIO (PNG de 512x512)
#    └── buildozer.spec
#
#  TIEMPOS ESPERADOS:
#    · Run #1 sin caché : 40 – 60 minutos
#    · Run #2+ con caché:  8 – 15 minutos
#
#  SI FALLA:
#    · Descarga "build-log-v9" desde la sección Artifacts del run
#    · El paso "Debug Workspace" muestra las últimas 80 líneas del log
#    · Busca la primera línea con "ERROR" o "Exception"
# ──────────────────────────────────────────────────────────────────────
