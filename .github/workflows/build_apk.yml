# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions Workflow — CYBERLOAD MSTL v13.0                     ║
# ║  Automatiza la construcción del APK con Buildozer en Ubuntu          ║
# ║                                                                      ║
# ║  Ruta en tu repo: .github/workflows/build_apk.yml                   ║
# ║                                                                      ║
# ║  FIXES v13.1:                                                        ║
# ║  · Cython 0.29.19 → 3.0.11 (compatible Python 3.9 + p4a moderno)   ║
# ║  · NDK 25.1 → 25.2.9519653 (versión real del alias "25b")           ║
# ║  · Symlink NDK → android-ndk-r25b (ruta que p4a espera)            ║
# ║  · ANDROIDNDK apunta al symlink correcto de Buildozer               ║
# ║  · ANDROIDMINAPI=26 exportado para evitar conflicto --ndk-api=21    ║
# ║  · buildozer -v para ver log completo de p4a                        ║
# ║  · Log de fallo ampliado a 300 líneas                               ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build Android APK

# ── Activador ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

# ── Trabajo principal ──────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Cyberload MSTL v13 APK
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ── PASO 1: Clonar el repositorio ────────────────────────────────
      - name: 🔍 Checkout del Repositorio
        uses: actions/checkout@v4

      # ── PASO 2: Configurar Python 3.9 ────────────────────────────────
      - name: 🐍 Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── PASO 3: Instalar Buildozer y Cython ──────────────────────────
      #
      # FIX: Cython actualizado de 0.29.19 → 3.0.11
      #   · Cython 0.29.x fue la última versión de la serie "legacy"
      #     diseñada para Python 3.7 y anteriores.
      #   · p4a moderno (2024+) y pyjnius requieren Cython ≥ 3.0 para
      #     compilar correctamente las extensiones nativas.
      #   · Con 0.29.19, la compilación de pyjnius y pillow falla
      #     silenciosamente durante el paso "p4a create".
      # ─────────────────────────────────────────────────────────────────
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install "cython==3.0.11"

      # ── PASO 4: Instalar dependencias del sistema (apt-get) ───────────
      - name: 🔧 Instalar Dependencias del Sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake
          sudo apt-get install -y libffi8 || sudo apt-get install -y libffi6 || true

      # ── PASO 5: Configurar Java 17 ────────────────────────────────────
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── PASO 6: Configurar Android SDK, Build Tools, NDK y symlinks ──
      #
      # ╔═══════════════════════════════════════════════════════════════╗
      # ║  FIX DEFINITIVO v13.1 — NDK y rutas de Buildozer             ║
      # ╠═══════════════════════════════════════════════════════════════╣
      # ║  CAUSA RAÍZ DEL CRASH EN p4a create:                         ║
      # ║  1. NDK 25.1.8937393 ≠ alias "25b" (es 25.2.9519653)        ║
      # ║     Buildozer busca "android-ndk-r25b" pero encuentra        ║
      # ║     la carpeta "25.1.8937393" → falla p4a create             ║
      # ║  2. ANDROIDNDK apuntaba al SDK del sistema, no al symlink     ║
      # ║     ~/.buildozer/.../android-ndk-r25b que usa p4a            ║
      # ║  3. minapi=26 en spec vs --ndk-api=21 que lanzaba p4a        ║
      # ║                                                               ║
      # ║  SOLUCIÓN (5 partes):                                         ║
      # ║  1. Instalar NDK 25.2.9519653 (versión real del alias 25b)   ║
      # ║  2. Crear symlink SDK: ~/.buildozer/.../android-sdk           ║
      # ║  3. Crear symlink NDK: ~/.buildozer/.../android-ndk-r25b     ║
      # ║     → apuntando al NDK 25.2 recién instalado                 ║
      # ║  4. Crear symlinks LEGACY tools/bin/ (sdkmanager/avdmanager) ║
      # ║  5. Exportar ANDROIDNDK al symlink de Buildozer (no al SDK)  ║
      # ╚═══════════════════════════════════════════════════════════════╝
      - name: 📱 Configurar Android SDK, Build Tools, NDK y Symlinks
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"

          # FIX: Versión numérica real del alias "25b"
          # "25b" corresponde exactamente a 25.2.9519653 en el repositorio de Google.
          # La versión 25.1.8937393 es "25a" — nombre diferente → ruta diferente.
          NDK_VERSION="25.2.9519653"
          NDK_ALIAS="android-ndk-r25b"
          NDK_PATH_SDK="$ANDROID_SDK/ndk/$NDK_VERSION"
          NDK_SYMLINK="$HOME/.buildozer/android/platform/$NDK_ALIAS"

          # ── [1/6] Aceptar licencias ───────────────────────────────
          echo "══ [1/6] Aceptando licencias del SDK ══"
          yes | "$SDKMANAGER" --licenses || true

          # ── [2/6] Instalar build-tools, plataforma y NDK ─────────
          echo "══ [2/6] Instalando build-tools;33.0.2, android-33 y NDK 25.2 ══"
          "$SDKMANAGER" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools" \
            "ndk;$NDK_VERSION"

          # ── [3/6] Symlink SDK para Buildozer ─────────────────────
          echo "══ [3/6] Creando symlink SDK para Buildozer ══"
          mkdir -p "$HOME/.buildozer/android/platform"
          if [ ! -e "$HOME/.buildozer/android/platform/android-sdk" ]; then
            ln -s "$ANDROID_SDK" "$HOME/.buildozer/android/platform/android-sdk"
            echo "✅ Symlink creado: ~/.buildozer/.../android-sdk → $ANDROID_SDK"
          else
            echo "ℹ️  Symlink SDK ya existe (cache hit)"
          fi

          # ── [4/6] Symlink NDK → android-ndk-r25b ─────────────────
          # CRÍTICO: p4a busca el NDK en la ruta:
          #   ~/.buildozer/android/platform/android-ndk-r25b
          # Si no existe ese symlink, p4a intenta descargar el NDK
          # desde internet durante el build y falla en CI.
          # ANDROIDNDK debe apuntar a este symlink, NO a la ruta del SDK.
          echo "══ [4/6] Creando symlink NDK → android-ndk-r25b ══"
          if [ ! -e "$NDK_SYMLINK" ]; then
            ln -s "$NDK_PATH_SDK" "$NDK_SYMLINK"
            echo "✅ Symlink NDK: $NDK_SYMLINK → $NDK_PATH_SDK"
          else
            echo "ℹ️  Symlink NDK ya existe (cache hit)"
          fi

          # ── [5/6] Symlinks LEGACY tools/bin/ ─────────────────────
          echo "══ [5/6] Creando symlinks de compatibilidad tools/bin/ ══"
          sudo mkdir -p "$ANDROID_SDK/tools/bin"

          sudo ln -sf \
            "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK/tools/bin/sdkmanager"

          sudo ln -sf \
            "$ANDROID_SDK/cmdline-tools/latest/bin/avdmanager" \
            "$ANDROID_SDK/tools/bin/avdmanager"

          sudo chmod +x \
            "$ANDROID_SDK/tools/bin/sdkmanager" \
            "$ANDROID_SDK/tools/bin/avdmanager"

          echo "✅ tools/bin/sdkmanager → cmdline-tools/latest/bin/sdkmanager"
          echo "✅ tools/bin/avdmanager → cmdline-tools/latest/bin/avdmanager"

          # ── [6/6] Verificaciones finales ──────────────────────────
          echo "══ [6/6] Verificaciones finales ══"

          echo "── aidl:"
          ls -la "$ANDROID_SDK/build-tools/33.0.2/aidl" \
            && echo "✅ aidl OK" || { echo "❌ aidl NO encontrado"; exit 1; }

          echo "── tools/bin/:"
          ls -la "$ANDROID_SDK/tools/bin/"

          echo "── NDK (ruta SDK):"
          ls -d "$NDK_PATH_SDK" \
            && echo "✅ NDK 25.2 en SDK OK" \
            || { echo "❌ NDK no encontrado en SDK"; exit 1; }

          echo "── NDK (symlink Buildozer):"
          ls -d "$NDK_SYMLINK" \
            && echo "✅ Symlink android-ndk-r25b OK" \
            || { echo "❌ Symlink NDK faltante"; exit 1; }

          # ── Exportar variables a GITHUB_ENV ───────────────────────
          # CRÍTICO: ANDROIDNDK apunta al SYMLINK de Buildozer,
          # NO a la ruta del SDK del sistema.
          # p4a lee ANDROIDNDK para saber dónde está el NDK.
          echo "ANDROID_HOME=$ANDROID_SDK"          >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK"      >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_SDK"            >> $GITHUB_ENV
          echo "ANDROIDNDK=$NDK_SYMLINK"            >> $GITHUB_ENV
          echo "ANDROIDAPI=33"                      >> $GITHUB_ENV
          echo "ANDROIDMINAPI=26"                   >> $GITHUB_ENV
          echo "PACKAGES_PATH=$HOME/.buildozer/android/packages" >> $GITHUB_ENV

          echo "$ANDROID_SDK/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools"     >> $GITHUB_PATH
          echo "$ANDROID_SDK/tools/bin"          >> $GITHUB_PATH

      # ── PASO 7: Restaurar Caché de Buildozer ─────────────────────────
      - name: 🗃️ Restaurar Caché de Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v13-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-${{ runner.os }}-

      # ── PASO 8: Construir APK Android (Debug) ────────────────────────
      #
      # FIX: Agregado flag -v a buildozer para activar verbose mode.
      # Sin -v, los errores internos de p4a quedan ocultos en el log.
      # Con -v, verás exactamente qué subcomando de p4a falla y por qué.
      # ─────────────────────────────────────────────────────────────────
      - name: 🚀 Construir APK Android (Debug)
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          ANDROIDAPI: ${{ env.ANDROIDAPI }}
          ANDROIDMINAPI: ${{ env.ANDROIDMINAPI }}
          PACKAGES_PATH: ${{ env.PACKAGES_PATH }}
          BUILDOZER_WARN_ON_ROOT: 0

      # ── PASO 9: Localizar y copiar APK a carpeta conocida ────────────
      - name: 🔎 Localizar y Copiar APK
        run: |
          echo "══ Buscando archivos .apk ══"
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          find "$HOME/.buildozer" -name "*.apk" 2>/dev/null || true

          mkdir -p artifacts

          if ls "$GITHUB_WORKSPACE"/bin/*.apk 1>/dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/bin/*.apk artifacts/
            echo "✅ APK copiado desde bin/"
          elif find "$HOME/.buildozer" -name "*.apk" | grep -q .; then
            find "$HOME/.buildozer" -name "*.apk" -exec cp {} artifacts/ \;
            echo "✅ APK copiado desde .buildozer interno"
          else
            echo "❌ No se encontró ningún .apk"
            exit 1
          fi

          ls -lh artifacts/

      # ── PASO 10: Mostrar log si el build falla ───────────────────────
      # FIX: Ampliado de 150 a 300 líneas para no cortar el error real
      # de p4a que aparece cientos de líneas antes del final del log.
      # ─────────────────────────────────────────────────────────────────
      - name: 🐛 Mostrar Log (solo si falla el build)
        if: failure()
        run: |
          echo "══ Últimas 300 líneas del log ══"
          tail -300 build.log || echo "No se encontró build.log"
          echo ""
          echo "══ Buscando errores clave en el log ══"
          grep -i "error\|failed\|exception\|traceback\|cannot\|no such" build.log \
            | tail -50 || echo "No se encontraron errores clave"

      # ── PASO 11: Subir APK como Artefacto descargable ────────────────
      - name: 📤 Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-v13-debug
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error
          overwrite: true
