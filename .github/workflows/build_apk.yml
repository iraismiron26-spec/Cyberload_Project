# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GitHub Actions Workflow — CYBERLOAD MSTL v13.0                     ║
# ║  Automatiza la construcción del APK con Buildozer en Ubuntu          ║
# ║                                                                      ║
# ║  Ruta en tu repo: .github/workflows/build_apk.yml                   ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build Android APK

# ── Activador ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

# ── Trabajo principal ──────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Cyberload MSTL v13 APK
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ── PASO 1: Clonar el repositorio ────────────────────────────────
      - name: 🔍 Checkout del Repositorio
        uses: actions/checkout@v4

      # ── PASO 2: Configurar Python 3.9 ────────────────────────────────
      - name: 🐍 Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── PASO 3: Instalar Buildozer y Cython ──────────────────────────
      - name: 📦 Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.19

      # ── PASO 4: Instalar dependencias del sistema (apt-get) ───────────
      - name: 🔧 Instalar Dependencias del Sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev
          sudo apt-get install -y libffi8 || sudo apt-get install -y libffi6 || true

      # ── PASO 5: Configurar Java 17 ────────────────────────────────────
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── PASO 6: Configurar Android SDK, Build Tools, NDK y symlinks ──
      #
      # ╔═══════════════════════════════════════════════════════════════╗
      # ║  FIX DEFINITIVO — "sdkmanager not installed"                  ║
      # ╠═══════════════════════════════════════════════════════════════╣
      # ║  CAUSA RAÍZ:                                                  ║
      # ║  Buildozer busca sdkmanager en la ruta LEGACY:                ║
      # ║    {sdk}/tools/bin/sdkmanager                                 ║
      # ║  El SDK moderno del runner lo tiene en:                       ║
      # ║    {sdk}/cmdline-tools/latest/bin/sdkmanager                  ║
      # ║                                                               ║
      # ║  SOLUCIÓN (4 partes):                                         ║
      # ║  1. Instalar build-tools;33.0.2, android-33 y NDK 25b.       ║
      # ║  2. Crear symlink SDK: ~/.buildozer/.../android-sdk           ║
      # ║     → /usr/local/lib/android/sdk                             ║
      # ║  3. Crear symlink LEGACY: {sdk}/tools/bin/sdkmanager          ║
      # ║     → {sdk}/cmdline-tools/latest/bin/sdkmanager              ║
      # ║     (Fix directo del error "sdkmanager not installed")        ║
      # ║  4. Crear symlink LEGACY: {sdk}/tools/bin/avdmanager          ║
      # ║     (Previene error encadenado en pasos posteriores)          ║
      # ╚═══════════════════════════════════════════════════════════════╝
      - name: 📱 Configurar Android SDK, Build Tools, NDK y Symlinks
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          NDK_VERSION="25.1.8937393"
          NDK_PATH="$ANDROID_SDK/ndk/$NDK_VERSION"

          # ── [1/5] Aceptar licencias ───────────────────────────────
          echo "══ [1/5] Aceptando licencias del SDK ══"
          yes | "$SDKMANAGER" --licenses || true

          # ── [2/5] Instalar build-tools, plataforma y NDK ─────────
          echo "══ [2/5] Instalando build-tools;33.0.2, android-33 y NDK 25b ══"
          "$SDKMANAGER" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools" \
            "ndk;$NDK_VERSION"

          # ── [3/5] Symlink SDK para Buildozer ─────────────────────
          echo "══ [3/5] Creando symlink SDK para Buildozer ══"
          mkdir -p "$HOME/.buildozer/android/platform"
          if [ ! -e "$HOME/.buildozer/android/platform/android-sdk" ]; then
            ln -s "$ANDROID_SDK" "$HOME/.buildozer/android/platform/android-sdk"
            echo "✅ Symlink creado: ~/.buildozer/.../android-sdk → $ANDROID_SDK"
          else
            echo "ℹ️  Symlink ya existe (cache hit)"
          fi

          # ── [4/5] Symlinks LEGACY tools/bin/ ─────────────────────
          # Buildozer busca sdkmanager y avdmanager en tools/bin/
          # (ruta antigua) pero el SDK moderno los tiene en
          # cmdline-tools/latest/bin/. Creamos los symlinks de
          # compatibilidad para que Buildozer los encuentre.
          echo "══ [4/5] Creando symlinks de compatibilidad tools/bin/ ══"
          sudo mkdir -p "$ANDROID_SDK/tools/bin"

          sudo ln -sf \
            "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK/tools/bin/sdkmanager"

          sudo ln -sf \
            "$ANDROID_SDK/cmdline-tools/latest/bin/avdmanager" \
            "$ANDROID_SDK/tools/bin/avdmanager"

          sudo chmod +x \
            "$ANDROID_SDK/tools/bin/sdkmanager" \
            "$ANDROID_SDK/tools/bin/avdmanager"

          echo "✅ tools/bin/sdkmanager → cmdline-tools/latest/bin/sdkmanager"
          echo "✅ tools/bin/avdmanager → cmdline-tools/latest/bin/avdmanager"

          # ── [5/5] Verificaciones finales ──────────────────────────
          echo "══ [5/5] Verificaciones finales ══"
          echo "── aidl:"
          ls -la "$ANDROID_SDK/build-tools/33.0.2/aidl" \
            && echo "✅ aidl OK" || { echo "❌ aidl NO encontrado"; exit 1; }

          echo "── tools/bin/:"
          ls -la "$ANDROID_SDK/tools/bin/"

          echo "── NDK:"
          ls -d "$NDK_PATH" \
            && echo "✅ NDK 25b OK" \
            || echo "⚠️  NDK no encontrado, Buildozer intentará descargarlo"

          # ── Exportar variables a GITHUB_ENV ───────────────────────
          echo "ANDROID_HOME=$ANDROID_SDK"      >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK"  >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_SDK"        >> $GITHUB_ENV
          echo "ANDROIDNDK=$NDK_PATH"           >> $GITHUB_ENV

          echo "$ANDROID_SDK/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools"     >> $GITHUB_PATH
          echo "$ANDROID_SDK/tools/bin"          >> $GITHUB_PATH

      # ── PASO 7: Restaurar Caché de Buildozer ─────────────────────────
      - name: 🗃️ Restaurar Caché de Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.android
          key: buildozer-v13-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v13-${{ runner.os }}-

      # ── PASO 8: Construir APK Android (Debug) ────────────────────────
      - name: 🚀 Construir APK Android (Debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          BUILDOZER_WARN_ON_ROOT: 0

      # ── PASO 9: Localizar y copiar APK a carpeta conocida ────────────
      - name: 🔎 Localizar y Copiar APK
        run: |
          echo "══ Buscando archivos .apk ══"
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          find "$HOME/.buildozer" -name "*.apk" 2>/dev/null || true

          mkdir -p artifacts

          if ls "$GITHUB_WORKSPACE"/bin/*.apk 1>/dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/bin/*.apk artifacts/
            echo "✅ APK copiado desde bin/"
          elif find "$HOME/.buildozer" -name "*.apk" | grep -q .; then
            find "$HOME/.buildozer" -name "*.apk" -exec cp {} artifacts/ \;
            echo "✅ APK copiado desde .buildozer interno"
          else
            echo "❌ No se encontró ningún .apk"
            exit 1
          fi

          ls -lh artifacts/

      # ── PASO 10: Mostrar log si el build falla ───────────────────────
      - name: 🐛 Mostrar Log (solo si falla el build)
        if: failure()
        run: |
          echo "══ Últimas 150 líneas del log ══"
          tail -150 build.log || echo "No se encontró build.log"

      # ── PASO 11: Subir APK como Artefacto descargable ────────────────
      - name: 📤 Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cyberload-mstl-v13-debug
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error
          overwrite: true
